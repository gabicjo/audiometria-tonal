<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiometria Tonal</title>
</head>
<body>
    <main>
        <div id="start-page">
            <button type="button" id="start-button">Iniciar Teste<button>
        </div>
        <div id="exam-page" class="mostrar">
            <h1 id="frequencia">
                <span id="frequencia-number">400</span>
                <span>hz</span>
            </h1>
            <h2 id="volume">
                <span id="volume-number">50</span>
                <span>%</span>
            </h2>
            <div id="buttons">
                <button type="button" id="escutou">Escutou</button>
                <button type="button" id="nao-escutou">Não escutou</button>
                <button type="button" id="proximo">Próximo</button>
            </div>
        </div>
    </main>
</body>
</html>
