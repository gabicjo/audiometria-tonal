<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiometria Tonal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="source/styles/global.css">
    <link rel="stylesheet" href="source/styles/styles.css">
</head>
<body>
    <main>
        <div id="start-page" class="mostrar">
            <div class="start-actions">
                <button type="button" id="mobile-play-tone" aria-label="Emitir ruído puro no celular">
                    <i class="fa-solid fa-volume-high"></i>
                    <span>Segure para emitir ruído puro</span>
                </button>
            </div>
        </div>
        <div id="exam-page" class="ocultar">
            <h1 id="frequencia">
                <span id="frequencia-number">8000</span>
                <span>Hz</span>
            </h1>
            <h2 id="volume">
                <span id="volume-number">100</span>
                <span>%</span>
            </h2>
            <div id="buttons">
                <button type="button" id="escutou">Escutou</button>
                <button type="button" id="nao-escutou">Não escutou</button>
                <button type="button" id="proximo">Outra frequencia</button>
            </div>
        </div>
    </main>
    <script src="source/js/app.js"></script>
</body>
</html>
